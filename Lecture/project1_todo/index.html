<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart TO-DO list</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <header>
        <h1>Smart TO-DO list</h1>
        <p id="taskCounter">No Tasks.</p>
    </header>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Enter your task to do.">

        <select id="prioritySelect">
            <button>Select Priority</button>
            <option value="low">Less</option>
            <option value="medium">Medium</option>
            <option value="high">More</option>
        </select>

        <input type="date" id="dueDate">
        <button id="addTaskBtn">+</button>
    </div>

    <div class="filters">
        <button class="filter active" data-filter="all">All</button>
        <button class="filter" data-filter="completed">Completed</button>
        <button class="filter" data-filter="pending">Pending</button>
    </div>

    <ul id="taskList"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
